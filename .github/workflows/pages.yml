name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch data for static export (Neon DB preferred, Notion fallback)
        run: node scripts/fetch-notion-static.mjs
        env:
          # ── Canonical source (Neon DB) ─────────────────────────────────────
          # When set, exports from internal DB — Notion is NOT queried for Caza data.
          # Configure DATABASE_URL in GitHub repo secrets to activate this path.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # ── Reference/import source (Notion fallback) ──────────────────────
          # Used only when DATABASE_URL is not set.
          # NOTION_TOKEN is the primary variable; NOTION_API_KEY is legacy alias.
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID_CAZA_PROPERTIES: ${{ secrets.NOTION_DATABASE_ID_CAZA_PROPERTIES }}
          NOTION_DATABASE_ID_CAZA_FINANCIAL: ${{ secrets.NOTION_DATABASE_ID_CAZA_FINANCIAL }}
          NOTION_DATABASE_ID_CAZA_CLIENTS: ${{ secrets.NOTION_DATABASE_ID_CAZA_CLIENTS }}
          NOTION_DATABASE_ID_VENTURE_SALES: ${{ secrets.NOTION_DATABASE_ID_VENTURE_SALES }}

      - name: Verify data (diagnose empty vs real)
        run: |
          echo "=== Data pipeline status ==="
          node -e "
            const fs = require('fs');
            const props = JSON.parse(fs.readFileSync('public/data/caza-properties.json','utf8'));
            const fin   = JSON.parse(fs.readFileSync('public/data/caza-financial.json','utf8'));
            const cli   = JSON.parse(fs.readFileSync('public/data/caza-clients.json','utf8'));
            const stats = JSON.parse(fs.readFileSync('public/data/caza-stats.json','utf8'));
            console.log('properties:', props.length, 'records');
            console.log('financial:', fin.length, 'records');
            console.log('clients:', cli.length, 'records');
            console.log('stats source:', stats.source);
            if (props.length === 0 && fin.length === 0 && cli.length === 0) {
              console.error('WARNING: all Caza data files are empty — check NOTION_TOKEN or DATABASE_URL secret');
            } else {
              console.log('OK: real data fetched successfully');
            }
          "

      - name: Build
        run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_DATA: "1"
          # NEXT_PUBLIC_ANTHROPIC_API_KEY deliberately omitted:
          # NEXT_PUBLIC_* vars are inlined into the client JS bundle and are
          # publicly visible to anyone who inspects the static output.
          # AI features on GitHub Pages require the user to supply their own key.

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
