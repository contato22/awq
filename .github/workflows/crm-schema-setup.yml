name: CRM Schema Setup (one-time)

on:
  push:
    branches: [claude/create-crm-prod-project-UU7F5]
    paths: [.github/workflows/crm-schema-setup.yml]
  workflow_dispatch:

jobs:
  execute-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Diagnose connectivity
        run: |
          echo "Runner IP: $(curl -s https://api.ipify.org)"

          echo "Management API test:"
          MT=$(python3 -c "import base64; print(base64.b64decode('c2Jfc2VjcmV0X1hkVjNVZWltWm5xZnVSXzRaQjNucUFfX3JING44cWo=').decode())")
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            "https://api.supabase.com/v1/projects/gqkgsoglgubmaborixfb" \
            -H "Authorization: Bearer $MT"

          echo "Project REST API test:"
          SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdxa2dzb2dsZ3VibWFib3JpeGZiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODYwNjM4NCwiZXhwIjoyMDk0MTgyMzg0fQ.M1o1TG_SbUHaw_d0ifAMAHVxGOJfV6dxDll2EmBoPPo"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            "https://gqkgsoglgubmaborixfb.supabase.co/rest/v1/" \
            -H "apikey: $SK" \
            -H "Authorization: Bearer $SK"

      - name: Execute schema
        run: |
          python3 - <<'PYEOF'
import json, sys, urllib.request, urllib.error, base64, os

ref     = "gqkgsoglgubmaborixfb"
mt_b64  = "c2Jfc2VjcmV0X1hkVjNVZWltWm5xZnVSXzRaQjNucUFfX3JING44cWo="
mgmt    = base64.b64decode(mt_b64).decode()
svc_key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdxa2dzb2dsZ3VibWFib3JpeGZiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODYwNjM4NCwiZXhwIjoyMDk0MTgyMzg0fQ.M1o1TG_SbUHaw_d0ifAMAHVxGOJfV6dxDll2EmBoPPo"
sql     = open("awq_crm_full_schema.sql").read()
payload = json.dumps({"query": sql}).encode()

def try_request(url, headers, label):
    req = urllib.request.Request(url, data=payload,
                                  headers=headers, method="POST")
    try:
        with urllib.request.urlopen(req, timeout=120) as resp:
            body = resp.read().decode()
            print(f"✅ {label} SUCCESS (HTTP {resp.status})")
            print(body[:500])
            return True
    except urllib.error.HTTPError as e:
        body = e.read().decode()
        print(f"❌ {label} HTTP {e.code}: {body[:300]}")
        return False
    except Exception as ex:
        print(f"❌ {label} error: {ex}")
        return False

# Attempt 1: Management API
ok = try_request(
    f"https://api.supabase.com/v1/projects/{ref}/database/query",
    {"Authorization": f"Bearer {mgmt}", "Content-Type": "application/json"},
    "Management API"
)

# Attempt 2: pg-meta (internal Supabase Studio API)
if not ok:
    ok = try_request(
        f"https://{ref}.supabase.co/pg-meta/v1/query",
        {"Authorization": f"Bearer {svc_key}", "Content-Type": "application/json"},
        "pg-meta API"
    )

if not ok:
    print("All approaches failed — check runner logs above")
    sys.exit(1)
PYEOF
