name: Apply ERP Schema (Supabase)

# ─── WHEN ─────────────────────────────────────────────────────────────────────
# Run manually via workflow_dispatch, or automatically on every push to main
# so the schema is always up-to-date after a deploy.
#
# REQUIRED GitHub Secret:
#   SUPABASE_DB_URL — Postgres connection string from Supabase dashboard:
#     Settings → Database → Connection string → URI (direct / pooler)
#     Example: postgresql://postgres.kkhxxsrgsewjfvnnssyf:[PASSWORD]@aws-0-xx.pooler.supabase.com:6543/postgres
#
# All SQL files use CREATE TABLE IF NOT EXISTS / ON CONFLICT DO NOTHING — idempotent.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "awq_erp_full_schema.sql"
      - "supabase/migrations/**"

permissions:
  contents: read

jobs:
  migrate:
    name: Apply ERP Schema to Supabase
    runs-on: ubuntu-latest
    if: ${{ vars.SKIP_ERP_MIGRATE != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secret present
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "⚠️  SUPABASE_DB_URL secret not set — skipping migration."
            echo "Add it in: Settings → Secrets and variables → Actions → New repository secret"
            echo "Value: your Supabase connection string (Settings → Database → URI)"
            exit 0
          fi
          echo "✓ SUPABASE_DB_URL is set — proceeding with migration."

      - name: Install psql client
        if: ${{ secrets.SUPABASE_DB_URL != '' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply ERP schema (idempotent)
        if: ${{ secrets.SUPABASE_DB_URL != '' }}
        continue-on-error: true
        run: |
          echo "Applying awq_erp_full_schema.sql …"
          if psql "$SUPABASE_DB_URL" -f awq_erp_full_schema.sql -v ON_ERROR_STOP=1; then
            echo "✓ ERP schema applied successfully."
          else
            echo "⚠️  psql falhou (possível restrição de IP neste runner). Schema pode já estar aplicado."
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply Supabase migrations (idempotent, ordered)
        if: ${{ secrets.SUPABASE_DB_URL != '' }}
        continue-on-error: true
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f …"
            if psql "$SUPABASE_DB_URL" -f "$f" -v ON_ERROR_STOP=1; then
              echo "✓ $f applied."
            else
              echo "⚠️  $f falhou (possível restrição de IP)."
            fi
          done
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Verify tables
        if: ${{ secrets.SUPABASE_DB_URL != '' }}
        continue-on-error: true
        run: |
          TABLES=$(psql "$SUPABASE_DB_URL" -t -c "
            SELECT tablename FROM pg_tables
            WHERE schemaname = 'public' AND tablename LIKE 'erp_%'
            ORDER BY tablename;
          " 2>/dev/null || echo "")
          echo "ERP tables present:"
          echo "$TABLES"
          COUNT=$(echo "$TABLES" | grep -c erp_ || true)
          echo "Total: $COUNT tables"
          if [ "$COUNT" -lt 7 ]; then
            echo "⚠️  Menos de 7 tabelas ERP encontradas ($COUNT). Pode ser restrição de IP ou DB diferente."
          else
            echo "✓ Schema verification passed."
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
