name: Backfill Balance Snapshots (one-shot)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/busy-cannon-8bblzi
    paths:
      - '.github/workflows/backfill-snapshots.yml'

permissions:
  contents: read

jobs:
  backfill:
    name: Disparar /api/setup/backfill-snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Poll deploy: aguardar middleware liberar a rota (≤12 min)"
        run: |
          set -e
          URL="https://awq-brown.vercel.app/api/setup/backfill-snapshots"
          for i in $(seq 1 72); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 -X GET "$URL?probe=1" || echo "000")
            echo "[$i/72] HTTP $STATUS"
            # 307 = middleware redirect to /login (rota ainda não pública)
            if [ "$STATUS" != "307" ] && [ "$STATUS" != "000" ]; then
              echo "Rota liberada — partindo pro POST real"
              break
            fi
            sleep 10
          done

      - name: "POST /api/setup/backfill-snapshots (preenche daily_balance_snapshots)"
        run: |
          set -e
          URL="https://awq-brown.vercel.app/api/setup/backfill-snapshots"
          echo "POST $URL"
          RESP=$(mktemp)
          STATUS=$(curl -sS --max-time 600 -o "$RESP" -w '%{http_code}' -X POST "$URL")
          echo "HTTP $STATUS"
          head -c 8000 "$RESP"
          echo
          if [ "$STATUS" != "200" ]; then exit 1; fi
          python3 -c "import json,sys; d=json.load(open('$RESP')); print('Backfill:', d.get('saved'), 'snapshots,', d.get('days'), 'dias,', d.get('accounts'), 'contas, ok=', d.get('ok'))"
