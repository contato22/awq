name: Auditoria Cora vs Banco

# Compara quantas transações estão na Cora vs no banco ERP.
# Se houver gaps, dispara sync automático via /api/cora/sync-probe.
# Resultado publicado como GitHub Issue com label "cora-audit".
#
# Disparo: manual (workflow_dispatch) ou automático via push no main.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cora-audit.yml'
      - 'app/api/cora/audit-probe/**'
      - 'app/api/cora/sync-probe/**'
      - 'middleware.ts'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Auditar e sincronizar transações Cora vs Supabase ERP
    runs-on: ubuntu-latest

    steps:
      # ── 0. Aguarda Vercel implantar o código ──────────────────────────────
      - name: "WAIT — aguardar deploy do Vercel (até 3 min)"
        id: wait
        run: |
          echo "Aguardando endpoint /api/cora/audit-probe ficar disponível..."
          MAX=18
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "https://awq-brown.vercel.app/api/cora/audit-probe?startDate=2026-01-01&endDate=2026-01-01" \
              2>/dev/null || echo "000")
            echo "  tentativa $i/$MAX → HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "501" ]; then
              echo "Vercel pronto (HTTP $STATUS)"
              echo "ready=true" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$i" = "$MAX" ]; then
              echo "Timeout — Vercel não respondeu em tempo hábil"
              echo "ready=false" >> $GITHUB_OUTPUT
            fi
            sleep 10
          done

      # ── 1. Health — infraestrutura e contagem total no banco ─────────────────
      - name: "FETCH — /api/health (infraestrutura + erpTransactionCount)"
        id: health
        continue-on-error: true
        run: |
          BODY=$(curl -s --max-time 30 https://awq-brown.vercel.app/api/health 2>/dev/null || echo "{}")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://awq-brown.vercel.app/api/health 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          parse() { echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print($1)" 2>/dev/null || echo "$2"; }

          ERP_PING=$(parse  "d.get('erpPing','?')"                          "?")
          ERP_TXN=$(parse   "d.get('erpTransactionCount','null')"            "null")
          CORA=$(parse      "str(d.get('coraReady',False)).lower()"          "false")
          JACQES=$(parse    "str(d.get('coraJacqes',False)).lower()"         "false")
          SYNC=$(parse      "str(d.get('syncReady',False)).lower()"          "false")
          DB_ADAPTER=$(parse "d.get('dbAdapter','unknown')"                  "unknown")

          echo "erp_ping=$ERP_PING"       >> $GITHUB_OUTPUT
          echo "erp_txn=$ERP_TXN"         >> $GITHUB_OUTPUT
          echo "cora=$CORA"               >> $GITHUB_OUTPUT
          echo "jacqes=$JACQES"           >> $GITHUB_OUTPUT
          echo "sync=$SYNC"               >> $GITHUB_OUTPUT
          echo "db_adapter=$DB_ADAPTER"   >> $GITHUB_OUTPUT

          echo "═══ /api/health ═══"
          echo "  erpPing:             $ERP_PING"
          echo "  erpTransactionCount: $ERP_TXN"
          echo "  coraReady:           $CORA"
          echo "  coraJacqes:          $JACQES"
          echo "  syncReady:           $SYNC"
          echo "  dbAdapter:           $DB_ADAPTER"

      # ── 2. Audit — chama /api/cora/audit-probe ────────────────────────────
      - name: "FETCH — /api/cora/audit-probe (Cora vs banco por conta)"
        id: audit
        continue-on-error: true
        run: |
          START="2026-01-01"
          END=$(date -u +%Y-%m-%d)
          URL="https://awq-brown.vercel.app/api/cora/audit-probe?startDate=${START}&endDate=${END}"
          BODY=$(curl -s --max-time 58 "$URL" 2>/dev/null || echo "{}")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 58 "$URL" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          echo "HTTP $STATUS | Body: ${BODY:0:2000}"

          if [ "$STATUS" = "200" ]; then
            TOTAL_MISSING=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('totalMissing',0))" 2>/dev/null || echo "0")
            CORA_TOTAL=$(echo "$BODY" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          accs=d.get('accounts',[])
          print(sum(a.get('coraTotal',0) for a in accs))
          " 2>/dev/null || echo "?")
            DB_TOTAL=$(echo "$BODY" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          accs=d.get('accounts',[])
          print(sum(a.get('dbTotal',0) for a in accs))
          " 2>/dev/null || echo "?")
            echo "total_missing=$TOTAL_MISSING" >> $GITHUB_OUTPUT
            echo "cora_total=$CORA_TOTAL"       >> $GITHUB_OUTPUT
            echo "db_total=$DB_TOTAL"           >> $GITHUB_OUTPUT
            echo "raw=$BODY"                    >> $GITHUB_OUTPUT
            echo "═══ Resultado auditoria ═══"
            echo "  Cora total:        $CORA_TOTAL"
            echo "  Banco total:       $DB_TOTAL"
            echo "  Faltando no banco: $TOTAL_MISSING"
          else
            echo "total_missing=erro_$STATUS" >> $GITHUB_OUTPUT
            echo "cora_total=?"               >> $GITHUB_OUTPUT
            echo "db_total=?"                 >> $GITHUB_OUTPUT
          fi

      # ── 3. Sync automático se houver gaps ─────────────────────────────────
      - name: "POST — /api/cora/sync-probe (importar lançamentos faltantes)"
        id: sync
        if: steps.audit.outputs.total_missing != '0' && steps.audit.outputs.status == '200'
        continue-on-error: true
        run: |
          START="2026-01-01"
          END=$(date -u +%Y-%m-%d)
          URL="https://awq-brown.vercel.app/api/cora/sync-probe"
          BODY=$(curl -s --max-time 58 -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "{\"startDate\":\"$START\",\"endDate\":\"$END\"}" \
            2>/dev/null || echo "{}")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 58 -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "{\"startDate\":\"$START\",\"endDate\":\"$END\"}" \
            2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          echo "HTTP $STATUS | Body: ${BODY:0:2000}"

          if [ "$STATUS" = "200" ]; then
            SYNCED=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('totalSynced',0))" 2>/dev/null || echo "?")
            echo "synced=$SYNCED" >> $GITHUB_OUTPUT
            echo "  Sincronizados: $SYNCED lançamentos"
          else
            echo "synced=erro_$STATUS" >> $GITHUB_OUTPUT
          fi

      # ── 4. Publicar resultado ─────────────────────────────────────────────
      - name: "Publicar resultado da auditoria como Issue"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HORA=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          ERP_PING="${{ steps.health.outputs.erp_ping }}"
          ERP_TXN="${{ steps.health.outputs.erp_txn }}"
          CORA="${{ steps.health.outputs.cora }}"
          JACQES="${{ steps.health.outputs.jacqes }}"
          SYNC="${{ steps.health.outputs.sync }}"
          DB_ADAPTER="${{ steps.health.outputs.db_adapter }}"
          AUDIT_STATUS="${{ steps.audit.outputs.status }}"
          TOTAL_MISSING="${{ steps.audit.outputs.total_missing }}"
          CORA_TOTAL="${{ steps.audit.outputs.cora_total }}"
          DB_TOTAL="${{ steps.audit.outputs.db_total }}"
          SYNC_STATUS="${{ steps.sync.outputs.status }}"
          SYNCED="${{ steps.sync.outputs.synced }}"

          gh label create "cora-audit" \
            --color "7057ff" \
            --description "Resultado da auditoria Cora vs banco" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          if [ "$AUDIT_STATUS" = "200" ]; then
            if [ "$TOTAL_MISSING" = "0" ]; then
              AUDIT_LINE="✅ Nenhum lançamento faltando — banco em dia com a Cora"
              SYNC_LINE=""
            else
              AUDIT_LINE="❌ **$TOTAL_MISSING** lançamento(s) na Cora NÃO estavam no banco"
              if [ "$SYNC_STATUS" = "200" ]; then
                SYNC_LINE="🔄 **Sync automático executado**: $SYNCED lançamentos importados"
              elif [ -n "$SYNC_STATUS" ]; then
                SYNC_LINE="⚠️ Sync automático falhou (HTTP $SYNC_STATUS)"
              else
                SYNC_LINE=""
              fi
            fi
          else
            AUDIT_LINE="⚠️ Auditoria retornou HTTP $AUDIT_STATUS"
            SYNC_LINE=""
          fi

          BODY="## Auditoria Cora vs Banco — $HORA

          ### Infraestrutura (/api/health)
          | Check | Valor |
          |---|---|
          | erpPing (Supabase ERP) | $ERP_PING |
          | erpTransactionCount (total) | $ERP_TXN |
          | coraHolding configurado | $CORA |
          | coraJacqes configurado | $JACQES |
          | syncReady (service role) | $SYNC |
          | dbAdapter | $DB_ADAPTER |

          ### Auditoria Cora (2026-01-01 → $( date -u +%Y-%m-%d ))
          | Conta | Cora | Banco | Gap |
          |---|---|---|---|
          | AWQ_Holding | $CORA_TOTAL | $DB_TOTAL | $TOTAL_MISSING |

          $AUDIT_LINE
          $SYNC_LINE

          ---
          *Gerado automaticamente pelo workflow cora-audit.yml*"

          gh issue create \
            --title "🔍 Auditoria Cora — $HORA" \
            --body "$BODY" \
            --label "cora-audit" \
            --repo "${{ github.repository }}"
