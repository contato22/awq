name: Seed Santander Extracts (one-shot)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/busy-cannon-8bblzi
    paths:
      - '.github/workflows/santander-seed.yml'

permissions:
  contents: read

jobs:
  seed:
    name: Disparar /api/setup/seed-santander-extracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "WAIT 90s — aguardar deploy Vercel"
        run: sleep 90

      - name: "POST /api/setup/seed-santander-extracts"
        run: |
          set -e
          URL="https://awq-brown.vercel.app/api/setup/seed-santander-extracts"
          echo "POST $URL"
          BODY=$(curl -sS --max-time 300 -X POST "$URL")
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 300 -X POST "$URL")
          echo "HTTP $STATUS"
          echo "Body: $BODY" | head -c 4000
          if [ "$STATUS" != "200" ]; then exit 1; fi
          echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f\"Seeded: {d.get('seeded')}/{d.get('totalMonths')} months, {d.get('totalTransactions')} txns\")"
