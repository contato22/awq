name: EPM Planning — Seed + Test (Supabase)

# ─── WHEN ─────────────────────────────────────────────────────────────────────
# Trigger manually from Actions tab, or automatically when relevant files change.
# SUPABASE_SERVICE_ROLE_KEY adicionado em 2026-05-21 — write tests ativos.
#
# REQUIRED GitHub Secrets:
#   SUPABASE_DB_URL          — Postgres direct connection string
#   SUPABASE_SERVICE_ROLE_KEY — Service role JWT (bypasses RLS)
#
# OPTIONAL:
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — Anon JWT (for client-side modules)
#
# The seed is idempotent (CREATE TABLE IF NOT EXISTS + ON CONFLICT DO UPDATE).
# Safe to run multiple times.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/check-epm-supabase-CYkWN
    paths:
      - "lib/epm-planning-db.ts"
      - "lib/db.ts"
      - "lib/supabase.ts"
      - "lib/financial-db.ts"
      - "lib/ppm-db.ts"
      - "lib/advisor-db.ts"
      - "lib/ma-db.ts"
      - "lib/caza-crm-db.ts"
      - "lib/crm-db.ts"
      - "lib/bpm-db.ts"
      - "lib/ap-ar-db.ts"
      - "scripts/seed-epm-planning.ts"
      - "scripts/test-epm-db.ts"
      - "app/api/epm/planning/**"
      - ".github/workflows/epm-seed-and-test.yml"

permissions:
  contents: read

jobs:
  seed-and-test:
    name: Seed EPM tables + run read/write tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Seed EPM tables (idempotente)
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️  SUPABASE_DB_URL não configurado — skipping seed."
            exit 0
          fi
          echo "✓ DATABASE_URL disponível — seedando tabelas EPM..."
          npm run seed:epm
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Run EPM read/write tests
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️  SUPABASE_DB_URL não configurado — rodando apenas testes de fallback estático."
          fi
          npm run test:epm
        env:
          DATABASE_URL:                   ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL:                   https://gqkgsoglgubmaborixfb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY:      ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:       https://gqkgsoglgubmaborixfb.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "## EPM Supabase — Seed + Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tabelas criadas (idempotente) | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dados seedados | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Testes read/write | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Supabase**: https://gqkgsoglgubmaborixfb.supabase.co" >> $GITHUB_STEP_SUMMARY
