name: EPM Planning — Seed + Test (Supabase)

# ─── WHEN ─────────────────────────────────────────────────────────────────────
# Trigger manually from Actions tab, or automatically when epm-planning-db.ts
# or the seed/test scripts change on main.
#
# REQUIRED GitHub Secrets:
#   NEXT_PUBLIC_SUPABASE_URL     — Supabase project URL (already set for build)
#   SUPABASE_SERVICE_ROLE_KEY    — Service role key (bypasses RLS)
#     Settings → Secrets → Actions → SUPABASE_SERVICE_ROLE_KEY
#
# OPTIONAL GitHub Secrets:
#   SUPABASE_DB_URL              — Postgres direct connection string
#     (only needed to create tables via SQL; skip if tables already exist)
#     Settings → Secrets → Actions → SUPABASE_DB_URL
#     Value: postgresql://postgres:[PASSWORD]@db.gqkgsoglgubmaborixfb.supabase.co:5432/postgres
#
# The seed is idempotent (ON CONFLICT DO UPDATE). Safe to run multiple times.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/check-epm-supabase-CYkWN
    paths:
      - "lib/epm-planning-db.ts"
      - "lib/db.ts"
      - "lib/supabase.ts"
      - "scripts/seed-epm-planning.ts"
      - "scripts/test-epm-db.ts"
      - "app/api/epm/planning/**"
      - ".github/workflows/epm-seed-and-test.yml"

permissions:
  contents: read

jobs:
  seed-and-test:
    name: Seed EPM tables + run read/write tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check secret present
        run: |
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY secret não configurado."
            echo "Adicione em: Settings → Secrets → Actions → SUPABASE_SERVICE_ROLE_KEY"
            echo "O seed e os testes requerem acesso ao Supabase via JS client."
            exit 0
          fi
          echo "✓ SUPABASE_SERVICE_ROLE_KEY disponível."

      - name: Seed EPM tables (idempotente)
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run seed:epm
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Run EPM read/write tests
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run test:epm
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Summary
        if: always()
        run: |
          echo "## EPM Supabase — Seed + Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tabelas criadas (idempotente) | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dados seedados | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Testes read/write | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Supabase**: https://gqkgsoglgubmaborixfb.supabase.co" >> $GITHUB_STEP_SUMMARY
