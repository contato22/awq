name: CI + Deploy to Vercel (Operational)

# ─── TRIGGER ─────────────────────────────────────────────────────────────────
#
# TWO DEPLOYMENT PATHS:
#
# 1. Vercel GitHub App (automatic, always active):
#    Deploys on every push to main via the Vercel GitHub integration.
#    Production URL: https://awq-brown.vercel.app
#    No GitHub Secrets required — the GitHub App uses its own token.
#
# 2. This workflow (supplementary Vercel CLI deploy):
#    Adds TypeScript validation before the Vercel CLI deploy.
#    Requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID as GitHub Secrets.
#    Useful for deploying from non-main branches or for explicit promotions.
#    If secrets are absent, the CI job still runs (TSC + Build) as a check.
#
# GitHub Pages (pages.yml) is the STATIC VITRINE only — incompatible with
# the operational pipeline. Do NOT use it as a backend substitute.

on:
  push:
    branches:
      - main
      - claude/consolidate-awq-platform-sMoN0
  workflow_dispatch:

# ─── PERMISSIONS ─────────────────────────────────────────────────────────────

permissions:
  contents: read
  deployments: write

# ─── JOBS ─────────────────────────────────────────────────────────────────────

jobs:
  # ── Job 1: CI Validation (always runs, must pass) ─────────────────────────
  ci:
    name: CI — TypeScript + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # ── SSR build (Vercel mode — no STATIC_EXPORT) ────────────────────────
      #
      # IMPORTANT: Do NOT pass NEXTAUTH_URL here.
      # When a GitHub Secret is unset, Actions evaluates "" (empty string).
      # NextAuth reads NEXTAUTH_URL at module init: `new URL("")` throws
      # TypeError: Invalid URL and breaks every prerendered page.
      # NEXTAUTH_URL is RUNTIME-ONLY (OAuth callbacks) — not needed at build.
      #
      # DATABASE_URL and BLOB_READ_WRITE_TOKEN are Vercel runtime env vars —
      # injected at request time, not at build time. Do NOT set them here.
      - name: Build (SSR)
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

  # ── Job 2: Vercel CLI Deploy (runs only when secrets are configured) ───────
  deploy:
    name: Deploy via Vercel CLI
    runs-on: ubuntu-latest
    needs: ci
    if: |
      vars.VERCEL_DEPLOY_ENABLED == 'true' ||
      (secrets.VERCEL_TOKEN != '' && github.ref == 'refs/heads/main')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build for Vercel
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✓ Deployed to: $DEPLOY_URL"

      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.deploy.outputs.deploy_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Alias**: https://awq-brown.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required Vercel env vars (set in Vercel dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| DATABASE_URL | Neon Postgres — persistent documents + transactions |" >> $GITHUB_STEP_SUMMARY
          echo "| BLOB_READ_WRITE_TOKEN | Vercel Blob — PDF storage across deployments |" >> $GITHUB_STEP_SUMMARY
          echo "| ANTHROPIC_API_KEY | Claude — PDF extraction pipeline |" >> $GITHUB_STEP_SUMMARY
          echo "| NEXTAUTH_SECRET | JWT signing for authentication |" >> $GITHUB_STEP_SUMMARY
          echo "| NEXTAUTH_URL | https://awq-brown.vercel.app |" >> $GITHUB_STEP_SUMMARY
