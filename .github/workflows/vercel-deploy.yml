name: CI — TypeScript + Build (Vercel Operational)

# ─── TRIGGER ─────────────────────────────────────────────────────────────────
#
# DEPLOYMENT ARCHITECTURE:
#
# Auto-deploy: Vercel GitHub App watches this repo and deploys on every push
#   to main automatically. Production URL: https://awq-brown.vercel.app
#   No GitHub Secrets or CLI required — the GitHub App has its own auth.
#
# This workflow: CI gate (TypeScript check + SSR build) that must pass before
#   any push is considered deployable. It validates that the code compiles and
#   the SSR build succeeds in a clean environment, catching build errors early.
#
# GitHub Pages (pages.yml): STATIC VITRINE only — incompatible with the
#   operational pipeline (no API routes, no SSR, no ingest capability).

on:
  push:
    branches:
      - main
      - claude/consolidate-awq-platform-sMoN0
      - claude/setup-supabase-auth-jARSs
  pull_request:
    branches:
      - main
  workflow_dispatch:

# ─── PERMISSIONS ─────────────────────────────────────────────────────────────

permissions:
  contents: read

# ─── JOBS ─────────────────────────────────────────────────────────────────────

jobs:
  ci:
    name: TypeScript + Build (SSR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── TypeScript — must have 0 errors ────────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── SSR build (Vercel runtime — no STATIC_EXPORT) ─────────────────────
      #
      # Supabase: NEXT_PUBLIC_* vars are embedded at build time.
      # The anon key is safe to expose (Row Level Security enforced on Supabase).
      # SUPABASE_SERVICE_ROLE_KEY is NOT passed here — never needed at build time.
      #
      # DATABASE_URL / BLOB_READ_WRITE_TOKEN are Vercel runtime env vars —
      # set in the Vercel dashboard, not in CI. The adapters detect them at
      # request time (USE_DB / USE_BLOB flags).
      - name: Build (SSR)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ── Static analysis — no-network tests (lint + git state) ──────────────
      - name: Lint
        run: npm run lint

      # ── Operational e2e (no external network required) ─────────────────────
      - name: E2E Runtime Eval
        run: node scripts/e2e-runtime-eval.mjs

      - name: Summary
        if: always()
        run: |
          echo "## CI Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Operational Infrastructure (Vercel Dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Purpose | Required |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| DATABASE_URL | Neon Postgres — persistent documents + transactions | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| BLOB_READ_WRITE_TOKEN | Vercel Blob — PDF storage across deployments | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| ANTHROPIC_API_KEY | Claude — PDF text extraction pipeline | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| NEXT_PUBLIC_SUPABASE_URL | Supabase project URL | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| NEXT_PUBLIC_SUPABASE_ANON_KEY | Supabase anon key (safe to expose) | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| SUPABASE_SERVICE_ROLE_KEY | Supabase admin key (server-only) | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Production URL**: https://awq-brown.vercel.app" >> $GITHUB_STEP_SUMMARY
