name: Deploy to Vercel (Operational)

# ─── TRIGGER ─────────────────────────────────────────────────────────────────
# Deploys the operational environment to Vercel from the canonical branch.
# GitHub Pages (pages.yml) is the STATIC DEMO only.
# This workflow is the REAL operational environment.

on:
  push:
    branches:
      - main
      - claude/consolidate-awq-platform-sMoN0
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview

# ─── PERMISSIONS ─────────────────────────────────────────────────────────────

permissions:
  contents: read
  deployments: write

# ─── JOBS ─────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── TypeScript validation ────────────────────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Production build (no STATIC_EXPORT — SSR + API routes active) ────────
      #
      # IMPORTANT: Do NOT pass NEXTAUTH_URL here.
      # When a GitHub Secret is unset, Actions evaluates it as "" (empty string).
      # NextAuth reads NEXTAUTH_URL at module init and calls `new URL("")` which
      # throws TypeError: Invalid URL and breaks every prerendered page.
      # NEXTAUTH_URL is RUNTIME-ONLY (OAuth callback routing) — not needed at build.
      # NEXTAUTH_SECRET is safe to pass (string value, not used as URL).
      #
      # DATABASE_URL and BLOB_READ_WRITE_TOKEN are injected by Vercel at runtime —
      # not needed at build time. The adapters detect them at request time.
      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      # ── Pre-flight: verify Vercel secrets are configured ─────────────────────
      - name: Check Vercel secrets
        run: |
          MISSING=""
          [ -z "$VERCEL_TOKEN" ]      && MISSING="$MISSING VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ]     && MISSING="$MISSING VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && MISSING="$MISSING VERCEL_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing GitHub Secrets:$MISSING"
            echo ""
            echo "Add these secrets at: Settings → Secrets → Actions"
            echo "  VERCEL_TOKEN       — from vercel.com/account/tokens"
            echo "  VERCEL_ORG_ID      — from vercel link (stores in .vercel/project.json)"
            echo "  VERCEL_PROJECT_ID  — from vercel link (stores in .vercel/project.json)"
            exit 1
          fi
          echo "✓ All Vercel secrets present"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Deploy via Vercel CLI ─────────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print deployment URL
        run: |
          echo "✓ Operational environment deployed to: ${{ steps.deploy.outputs.deploy_url }}"
          echo ""
          echo "Required Vercel environment variables (set in Vercel dashboard):"
          echo "  DATABASE_URL         — Neon Postgres connection string"
          echo "  BLOB_READ_WRITE_TOKEN — Vercel Blob token"
          echo "  ANTHROPIC_API_KEY    — Claude API key for PDF extraction"
          echo "  NEXTAUTH_SECRET      — NextAuth signing secret"
          echo "  NEXTAUTH_URL         — Application URL"
