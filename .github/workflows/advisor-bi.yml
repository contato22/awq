name: Deploy — Advisor BI

on:
  push:
    branches:
      - main
      - claude/add-avva-client-data-xiLSu
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Notion data (pre-build)
        run: node scripts/fetch-notion-static.mjs
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID_CAZA_CLIENTS: ${{ secrets.NOTION_DATABASE_ID_CAZA_CLIENTS }}

      - name: Build (advisor-bi)
        run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_DATA: "1"
          NEXT_PUBLIC_BASE_PATH: "/advisor-bi"
          NEXT_PUBLIC_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to contato22/advisor-bi
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PERSONAL_TOKEN }}
          external_repository: contato22/advisor-bi
          publish_dir: ./out
          force_orphan: true

      - name: Switch advisor-bi Pages source to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
        run: |
          HTTP=$(curl -s -o /tmp/pages_resp.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/contato22/advisor-bi/pages \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}')
          echo "Pages API → HTTP $HTTP"
          cat /tmp/pages_resp.json
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then
            echo "Warning: Pages source switch returned $HTTP — may need manual update in repo settings."
          fi
